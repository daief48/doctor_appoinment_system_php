<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Panel - Profile</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="wrapper">
        <!-- Sidebar Navigation -->
        <nav id="sidebar">
            <div class="sidebar-header">
                <i class="bi bi-heart-pulse-fill logo-icon"></i>
                <h4>MediCare</h4>
            </div>
            <ul class="list-unstyled components">
                <li><a href="index.html" class="nav-link-btn"><i class="bi bi-grid"></i> Dashboard</a></li>
                <li><a href="appointments.html" class="nav-link-btn"><i class="bi bi-calendar-event"></i> Appointments</a></li>
                <li><a href="patients.html" class="nav-link-btn"><i class="bi bi-people"></i> Patients</a></li>
                <li><a href="prescriptions.html" class="nav-link-btn"><i class="bi bi-file-medical"></i> Prescriptions</a></li>
                <li><a href="schedule.html" class="nav-link-btn"><i class="bi bi-clock-history"></i> Schedule</a></li>
                <li class="active"><a href="profile.html" class="nav-link-btn"><i class="bi bi-person-badge"></i> Profile Setup</a></li>
            </ul>
        </nav>

        <div id="content">
            <!-- FULL STANDARD TOP NAVBAR -->
            <nav class="top-navbar">
                <button type="button" id="sidebarCollapse" class="btn text-primary fs-4 d-lg-none">
                    <i class="bi bi-list"></i>
                </button>
                <div class="nav-search d-none d-md-block">
                    <i class="bi bi-search"></i>
                    <input type="text" class="form-control" placeholder="Search patients, appointments...">
                </div>
                <div class="nav-actions">
                    <div class="dropdown">
                        <button class="nav-icon-btn dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-bell"></i>
                            <span class="notification-badge"></span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0" style="width: 300px;">
                            <li><h6 class="dropdown-header fw-bold border-bottom pb-2">Notifications</h6></li>
                            <li><a class="dropdown-item py-2" href="#">
                                <div class="d-flex align-items-center">
                                    <div class="bg-primary-light text-primary rounded-circle p-2 me-3"><i class="bi bi-calendar-plus"></i></div>
                                    <div><p class="mb-0 fw-semibold text-wrap text-truncate" style="max-width: 200px;">New appointment booked</p><small class="text-muted">Just now</small></div>
                                </div>
                            </a></li>
                        </ul>
                    </div>
                    <div class="dropdown profile-dropdown">
                        <a href="#" class="dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                            <img src="https://ui-avatars.com/api/?name=Dr+Smith&background=0b5ed7&color=fff" alt="Profile">
                            <span class="d-none d-md-inline ms-2">Dr. Smith</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
                            <li><a class="dropdown-item" href="profile.html"><i class="bi bi-person me-2"></i> My Profile</a></li>
                            <li><a class="dropdown-item" href="schedule.html"><i class="bi bi-calendar-check me-2"></i> Availability</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="login.html"><i class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
                        </ul>
                    </div>
                </div>
            </nav>

            <div class="main-content-section active" style="display:block;">
                <h3 class="fw-bold mb-4">Profile Settings</h3>
                <div class="row g-4">
                    <div class="col-lg-4">
                        <div class="card border-0 shadow-sm rounded-4 text-center p-4">
                            <img src="https://ui-avatars.com/api/?name=Dr+Smith&size=120" class="rounded-circle shadow-sm mx-auto mb-3">
                            <h4 class="fw-bold mt-2 mb-1">Dr. Smith</h4>
                            <p class="text-muted">Cardiologist</p>
                            <button class="btn btn-outline-primary btn-sm mt-2">Change Photo</button>
                        </div>
                    </div>
                    <div class="col-lg-8">
                        <div class="card border-0 shadow-sm rounded-4 p-4">
                            <h5 class="fw-bold mb-4">Personal Information</h5>
                            <form>
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">First Name</label>
                                        <input type="text" class="form-control" value="John">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Last Name</label>
                                        <input type="text" class="form-control" value="Smith">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Email Address</label>
                                        <input type="email" class="form-control" value="dr.smith@example.com">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Phone Number</label>
                                        <input type="text" class="form-control" value="+1 234 567 8900">
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label fw-semibold">Address</label>
                                        <textarea class="form-control" rows="2">123 Health Ave, Medical City</textarea>
                                    </div>
                                    <div class="col-12 mt-4 text-end">
                                        <button type="button" class="btn btn-primary px-4">Save Changes</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/script.js"></script>
</body>
</html>
